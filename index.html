<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEC Student Search</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    window.__gcse = { parsetags: 'explicit' };

    // ── Blocked search terms ──────────────────────────────────────
    const BLOCKED = [
      'porn','sex','nude','naked','xxx','adult','erotic','hentai',
      'playboy','onlyfans','nsfw','fuck','shit','bitch','ass','dick',
      'penis','vagina','boobs','breast','nipple',
    ];

    function isBlocked(q) {
      const lower = q.toLowerCase();
      return BLOCKED.some(w => {
        const re = new RegExp('\\b' + w + '\\b', 'i');
        return re.test(lower);
      });
    }
  </script>
  <script async src="https://cse.google.com/cse.js?cx=007545801562387941008:s3n9yitemci"></script>

  <style>
    /* ── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #2c2b94;   /* LEC primary — deep navy/indigo  */
      --blue:       #416ca9;   /* LEC secondary — medium blue     */
      --sky:        #a1d9e8;   /* LEC light blue accent           */
      --red:        #e0251c;   /* LEC red accent                  */
      --orange:     #ed733c;   /* LEC orange                      */
      --charcoal:   #414042;   /* LEC text color                  */
      --bg:         #f4f6fb;
      --white:      #ffffff;
      --border:     #dde3ef;
      --muted:      #6b7280;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      background: var(--navy);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 10px rgba(44,43,148,0.3);
      flex-shrink: 0;
    }

    header img.logo {
      height: 34px;
      width: auto;
      object-fit: contain;
    }

    .header-divider {
      width: 1px;
      height: 28px;
      background: rgba(255,255,255,0.25);
    }

    .header-label {
      color: rgba(255,255,255,0.85);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    /* ── Main ─────────────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 920px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* ── Search card ──────────────────────────────────────────── */
    .search-card {
      background: var(--white);
      border-radius: 14px;
      padding: 28px 32px;
      box-shadow: 0 2px 16px rgba(44,43,148,0.08);
      border: 1px solid var(--border);
    }

    /* ── Google CSE Overrides ─────────────────────────────────── */
    /* ── Custom search box ───────────────────────────────────── */
    .search-form {
      display: flex;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s;
      background: white;
    }
    .search-form:focus-within { border-color: var(--navy); }

    .search-input {
      flex: 1;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--charcoal);
      border: none;
      outline: none;
      background: transparent;
    }
    .search-input::placeholder { color: #aaa; }
    .search-input::-webkit-search-cancel-button { display: none; }

    .search-btn {
      padding: 0 18px;
      background: var(--navy);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: background 0.15s;
    }
    .search-btn:hover { background: var(--blue); }

    .gsc-control-cse {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      font-family: 'Inter', sans-serif !important;
    }

    /* Input */
    .gsc-input-box {
      border-radius: 10px 0 0 10px !important;
      border: 1.5px solid var(--border) !important;
      border-right: none !important;
      box-shadow: none !important;
      transition: border-color 0.15s !important;
    }

    .gsc-input-box:focus-within {
      border-color: var(--navy) !important;
    }

    .gsc-input {
      font-family: 'Inter', sans-serif !important;
      font-size: 0.95rem !important;
      color: var(--charcoal) !important;
    }

    /* Search button */
    .gsc-search-button { margin-left: 0 !important; }

    .gsc-search-button-v2 {
      background: var(--navy) !important;
      border: none !important;
      border-radius: 0 10px 10px 0 !important;
      padding: 10px 18px !important;
      cursor: pointer !important;
      transition: background 0.15s !important;
    }

    .gsc-search-button-v2:hover { background: var(--blue) !important; }
    .gsc-search-button-v2 svg  { fill: white !important; }

    /* Tabs */
    .gsc-refinementsArea {
      border-bottom: 2px solid var(--border) !important;
      margin: 20px 0 14px !important;
    }

    .gsc-tabHeader {
      font-family: 'Inter', sans-serif !important;
      font-size: 0.8rem !important;
      font-weight: 500 !important;
      color: var(--muted) !important;
      padding: 8px 15px !important;
      border: none !important;
      background: none !important;
      border-bottom: 3px solid transparent !important;
      margin-bottom: -2px !important;
      cursor: pointer !important;
      transition: color 0.12s !important;
    }

    .gsc-tabHeader:hover { color: var(--navy) !important; }

    .gsc-tabHeader.gsc-tabhActive {
      color: var(--navy) !important;
      border-bottom-color: var(--navy) !important;
      font-weight: 700 !important;
    }

    /* Results */
    .gsc-result {
      border-bottom: 1px solid #eef1f8 !important;
      padding: 16px 0 !important;
    }

    .gs-title {
      font-family: 'Inter', sans-serif !important;
      font-size: 1rem !important;
      font-weight: 600 !important;
      color: var(--navy) !important;
    }

    .gs-title:hover { color: var(--blue) !important; }
    .gs-title b     { font-weight: 700 !important; }

    .gsc-url-top {
      font-size: 0.75rem !important;
      color: #2d8a55 !important;
      margin: 3px 0 6px !important;
    }

    .gs-snippet {
      font-family: 'Inter', sans-serif !important;
      font-size: 0.875rem !important;
      color: #4b5563 !important;
      line-height: 1.65 !important;
    }

    .gs-snippet b { color: var(--charcoal) !important; font-weight: 600 !important; }

    /* Promoted results */
    .gsc-promotion {
      background: #eef3ff !important;
      border: 1px solid #c7d3f5 !important;
      border-left: 4px solid var(--navy) !important;
      border-radius: 10px !important;
      padding: 12px 16px !important;
      margin-bottom: 14px !important;
    }

    .gsc-promotion-title {
      color: var(--navy) !important;
      font-weight: 600 !important;
      font-size: 0.95rem !important;
    }

    .gsc-promotion-snippet {
      font-size: 0.83rem !important;
      color: var(--muted) !important;
    }

    /* Remove Google branding footer */
    .gcsc-find-more-on-google,
    .gcsc-find-more-on-google-root { display: none !important; }

    /* Pagination */
    .gsc-cursor-box {
      margin-top: 24px !important;
      text-align: center !important;
    }

    .gsc-cursor-page {
      font-family: 'Inter', sans-serif !important;
      font-size: 0.875rem !important;
      color: var(--navy) !important;
      padding: 6px 13px !important;
      border-radius: 7px !important;
      border: 1.5px solid var(--border) !important;
      margin: 0 3px !important;
      cursor: pointer !important;
      transition: all 0.12s !important;
    }

    .gsc-cursor-page:hover {
      background: #eef3ff !important;
      border-color: var(--navy) !important;
    }

    .gsc-cursor-current-page {
      background: var(--navy) !important;
      color: white !important;
      border-color: var(--navy) !important;
    }

    .gsc-branding, .gsib_b, .gsc-branding-user, .gsc-branding-img,
    .gsc-branding-clickable, .gs_branding, .gsc-search-box .gsib_b,
    td.gsib_b, .gsc-input-box td:last-child,
    .gsc-results .gsc-branding, .gcsc-branding-img-noclear,
    .gcsc-find-more-on-google, .gcsc-find-more-on-google-root,
    a[href*="google.com/cse"] { display: none !important; }

    /* ── Footer ───────────────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: 0.71rem;
      color: #9ca3af;
      padding: 14px 16px 20px;
      letter-spacing: 0.02em;
    }

    footer span {
      color: var(--sky);
      font-weight: 600;
    }

    /* ── Mobile ───────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 0 16px; height: 52px; }
      header img.logo { height: 26px; }
      .search-card { padding: 18px 16px; border-radius: 10px; }
      .gsc-tabHeader { padding: 7px 10px !important; font-size: 0.75rem !important; }
    }
  </style>
</head>
<body>

  <header>
    <img class="logo" src="logo-white.png" alt="Lubavitch Educational Center" />
    <div class="header-divider"></div>
    <span class="header-label">Student Search</span>
  </header>

  <main>
    <div class="search-card">
      <form class="search-form" id="search-form">
        <input type="search" class="search-input" id="search-input"
               placeholder="Search…" autocomplete="off" spellcheck="false" />
        <button type="submit" class="search-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
      </form>
      <div id="results-container">
        <div class="gcse-searchresults-only" data-linkTarget="_self"></div>
      </div>
    </div>
  </main>

  <footer>
    Safe, curated search &nbsp;·&nbsp; <span>Lubavitch Educational Center</span>
  </footer>

  <script>
    const TAB_LABELS = {
      'judaic_texts': 'Judaic Texts',
      'chassidus':    'Chassidus',
      'math':         'Math',
      'science':      'Science',
      'history':      'History',
      'reference':    'Reference',
    };

    function renameTabs() {
      document.querySelectorAll('.gsc-tabHeader').forEach(el => {
        const key = el.textContent.trim();
        if (TAB_LABELS[key]) el.textContent = TAB_LABELS[key];
      });
    }

    function execSearch(q) {
      if (!q) return;
      if (isBlocked(q)) {
        document.getElementById('results-container').innerHTML =
          '<p style="padding:24px;color:#c00;font-family:Inter,sans-serif">That search isn\'t available. Please try a different topic.</p>';
        return;
      }
      history.replaceState({}, '', '?q=' + encodeURIComponent(q));
      const el = google.search.cse.element.getAllElements();
      const key = Object.keys(el)[0];
      if (key) el[key].execute(q);
    }

    document.getElementById('search-form').addEventListener('submit', function(e) {
      e.preventDefault();
      execSearch(document.getElementById('search-input').value.trim());
    });

    // Run initial search from URL ?q= parameter (omnibox flow)
    window.__gcse = {
      parsetags: 'explicit',
      callback: function() {
        google.search.cse.element.render({ div: 'results-container', tag: 'searchresults-only', attributes: { linkTarget: '_self' } });
        const q = new URLSearchParams(window.location.search).get('q');
        if (q) {
          document.getElementById('search-input').value = q;
          execSearch(q);
        }
        new MutationObserver(renameTabs).observe(document.getElementById('results-container'), { childList: true, subtree: true });
      }
    };
  </script>

</body>
</html>
