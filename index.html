<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEC Student Search</title>
  <!-- Replace YOUR_CX_ID below with your PSE engine ID (cx=...) from programmablesearchengine.google.com -->
  <script async src="https://cse.google.com/cse.js?cx=YOUR_CX_ID"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
    }

    header {
      background: #1a73e8;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    header .school-name {
      font-size: 0.8rem;
      opacity: 0.8;
      margin-top: 2px;
    }

    .search-container {
      max-width: 860px;
      margin: 32px auto;
      padding: 0 16px;
    }

    /* Override Google's default widget styles for a cleaner look */
    .gsc-control-cse {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
    }

    .gsc-search-box {
      margin-bottom: 16px;
    }

    .gsc-input-box {
      border-radius: 24px !important;
      border: 1px solid #dfe1e5 !important;
      box-shadow: 0 1px 6px rgba(32,33,36,0.1) !important;
      padding: 8px 16px !important;
    }

    .gsc-search-button {
      background: #1a73e8 !important;
      border-radius: 24px !important;
      border: none !important;
      padding: 8px 20px !important;
    }

    .gsc-refinementsArea {
      border-bottom: 2px solid #e8eaed;
      margin-bottom: 16px;
    }

    .gsc-tabHeader {
      font-size: 0.85rem !important;
      color: #5f6368 !important;
      padding: 8px 16px !important;
      border: none !important;
      background: none !important;
      cursor: pointer;
    }

    .gsc-tabHeader.gsc-tabhActive {
      color: #1a73e8 !important;
      border-bottom: 3px solid #1a73e8 !important;
      font-weight: 600 !important;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>LEC Student Search</h1>
      <div class="school-name">Lubavitch Educational Center</div>
    </div>
  </header>

  <div class="search-container">
    <div class="gcse-searchbox-only" data-autoSearchOnLoad="true"></div>
    <div class="gcse-searchresults-only"></div>
  </div>

</body>
</html>
