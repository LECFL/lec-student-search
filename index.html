<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEC Student Search</title>
  <!-- Replace YOUR_CX_ID with your PSE engine ID from programmablesearchengine.google.com -->
  <script async src="https://cse.google.com/cse.js?cx=YOUR_CX_ID"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
    }

    header {
      background: #1a4b8c;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-text h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .header-text p {
      font-size: 0.75rem;
      opacity: 0.75;
      margin-top: 2px;
    }

    .search-container {
      max-width: 900px;
      margin: 32px auto;
      padding: 0 16px;
    }

    /* ---- Google CSE overrides ---- */
    .gsc-control-cse {
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
    }

    .gsc-input-box {
      border-radius: 24px !important;
      border: 1px solid #dfe1e5 !important;
      box-shadow: 0 1px 6px rgba(32,33,36,0.12) !important;
    }

    .gsc-search-button-v2 {
      background: #1a4b8c !important;
      border-radius: 0 24px 24px 0 !important;
      border: none !important;
      padding: 8px 18px !important;
    }

    .gsc-tabHeader {
      font-size: 0.82rem !important;
      padding: 8px 14px !important;
    }

    .gsc-tabHeader.gsc-tabhActive {
      color: #1a4b8c !important;
      border-bottom: 3px solid #1a4b8c !important;
      font-weight: 700 !important;
    }

    /* Hebrew text renders better with a larger line height */
    .gsc-result .gsc-url-top,
    .gsc-result .gs-title,
    .gsc-result .gs-snippet {
      line-height: 1.6 !important;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-text">
      <h1>LEC Student Search</h1>
      <p>Lubavitch Educational Center — Safe, curated search</p>
    </div>
  </header>

  <div class="search-container">
    <div class="gcse-searchbox-only" data-autoSearchOnLoad="true"></div>
    <div class="gcse-searchresults-only"></div>
  </div>

</body>
</html>
